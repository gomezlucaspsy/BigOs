name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ─────────────────────────────────────────────────────────
          - label: windows-x64
            os: windows-latest
            bin_suffix: .exe
            archive_cmd: zip
            archive_name: bigos-desktop-windows-x64.zip

          # ── macOS Apple Silicon ──────────────────────────────────────────────
          - label: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            bin_suffix: ""
            archive_cmd: tar
            archive_name: bigos-desktop-macos-arm64.tar.gz

          # ── macOS Intel ──────────────────────────────────────────────────────
          - label: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            bin_suffix: ""
            archive_cmd: tar
            archive_name: bigos-desktop-macos-x64.tar.gz

          # ── Linux x64 ────────────────────────────────────────────────────────
          - label: linux-x64
            os: ubuntu-22.04
            bin_suffix: ""
            archive_cmd: tar
            archive_name: bigos-desktop-linux-x64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.label }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.label }}-cargo-

      # ── Linux system deps for WebKitGTK / GStreamer ────────────────────────
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            pkg-config \
            build-essential

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build release
        run: |
          $target_args = if ('${{ matrix.target }}' -ne '') { '--target ${{ matrix.target }}' } else { '' }
          cargo build --release -p bigos-desktop $target_args
        shell: pwsh

      # ── Package ───────────────────────────────────────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target/release/bigos-desktop.exe"
          Compress-Archive -Path $bin -DestinationPath "${{ matrix.archive_name }}"

      - name: Package (macOS / Linux)
        if: runner.os != 'Windows'
        run: |
          BIN_DIR="target/release"
          if [ -n "${{ matrix.target }}" ]; then
            BIN_DIR="target/${{ matrix.target }}/release"
          fi
          tar -czf "${{ matrix.archive_name }}" -C "$BIN_DIR" bigos-desktop

      # ── Checksum ─────────────────────────────────────────────────────────
      - name: Generate SHA-256 checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ matrix.archive_name }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.archive_name }}" | Out-File -FilePath "${{ matrix.archive_name }}.sha256" -Encoding ascii

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bigos-${{ matrix.label }}
          path: |
            ${{ matrix.archive_name }}
            ${{ matrix.archive_name }}.sha256

  # ── Draft + publish GitHub Release ────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List files
        run: find dist -type f | sort

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
          draft: false

