name: Release Desktop Cpp

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WebView2 SDK via NuGet
        shell: pwsh
        run: |
          nuget install Microsoft.Web.WebView2 -OutputDirectory deps
          $pkg = Get-ChildItem deps -Directory | Where-Object { $_.Name -like 'Microsoft.Web.WebView2*' } | Select-Object -First 1
          if (-not $pkg) { throw 'WebView2 SDK package not found' }
          "WEBVIEW2_SDK_PATH=$($pkg.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DWEBVIEW2_SDK_PATH="$env:WEBVIEW2_SDK_PATH"

      - name: Build Release
        shell: pwsh
        run: |
          cmake --build build --config Release

      - name: Package executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "build/cpp/apps/bigos-desktop/Release/bigos-desktop.exe" "dist/bigos-desktop.exe"
          Compress-Archive -Path dist/bigos-desktop.exe -DestinationPath dist/bigos-desktop-windows-x64.zip

      - name: Generate SHA256
        shell: pwsh
        run: |
          $hash = (Get-FileHash "dist/bigos-desktop-windows-x64.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  bigos-desktop-windows-x64.zip" | Out-File "dist/bigos-desktop-windows-x64.zip.sha256" -Encoding ascii

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bigos-desktop-windows-x64.zip
            dist/bigos-desktop-windows-x64.zip.sha256
          generate_release_notes: true

